<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LiteChat</title>
<link rel="icon" type="image/svg+xml" href="/public/logo.svg">
<meta property="og:title" content="LiteChat">
<meta property="og:description" content="轻量化、开箱即用的多用户 AI 对话网站">
<meta property="og:image" content="/public/logo.svg">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/public/style.css">
</head>
<body>
<div class="app-layout" id="appLayout">
  <div class="scroll-anchors" id="scrollAnchors" style="display:none;"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px;">
        <img src="/public/logo.svg" width="28" height="28" alt="LiteChat" style="border-radius:7px;">
        <span style="font-size:15px;font-weight:600;color:var(--text-primary);">LiteChat</span>
      </div>
      <button class="btn btn-primary" id="newChatBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        新对话
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar-sm" id="userAvatar">U</div>
        <span id="userEmail" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">...</span>
        <a href="/admin" id="adminLink" style="display:none;" title="管理面板">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
        <button class="btn-icon" id="logoutBtn" title="登出">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="chat-area">
    <div class="chat-header">
      <button class="mobile-menu-btn" id="menuBtn" aria-label="菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div style="position:relative;" id="modelSelectorWrap">
        <button class="model-select-btn" id="modelSelectBtn">
          <img id="modelSelectLogo" src="" alt="" style="display:none;">
          <span id="modelSelectName">选择模型</span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown" style="display:none;"></div>
      </div>

      <span style="flex:1;"></span>
      <button class="btn btn-sm" id="themeToggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        主题
      </button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">
        <img src="/public/logo.svg" width="52" height="52" alt="LiteChat" style="opacity:0.85;">
        <h3>开始对话</h3>
        <p>选择模型后在下方输入消息</p>
      </div>
    </div>

    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <textarea id="msgInput" rows="1" placeholder="发送消息..." onkeydown="handleInputKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script src="/public/app.js"></script>
</body>
</html>
