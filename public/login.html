<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LiteChat</title>
<link rel="icon" type="image/svg+xml" href="/public/logo.svg">
<meta property="og:title" content="LiteChat">
<meta property="og:description" content="轻量化、开箱即用的多用户 AI 对话网站">
<meta property="og:image" content="/public/logo.svg">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <div class="page-center">
    <div class="auth-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
        <img src="/public/logo.svg" width="40" height="40" alt="LiteChat" style="border-radius:10px;">
        <div>
          <h1 id="pageTitle" style="margin-bottom:0;">LiteChat</h1>
          <p class="subtitle" id="pageSubtitle" style="margin-bottom:0;">轻量 AI 对话</p>
        </div>
      </div>
      <form id="authForm" autocomplete="on">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" placeholder="至少4位" required autocomplete="current-password" minlength="4">
        </div>
        <div class="form-error" id="formError"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px 20px;font-size:15px;" id="submitBtn">登录</button>
      </form>
      <div class="footer" id="modeSwitch">
        没有账号？<a href="#" id="toggleMode">去注册</a>
      </div>
    </div>
  </div>
  <script src="/public/login.js"></script>
</body>
</html>
