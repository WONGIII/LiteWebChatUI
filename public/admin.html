<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>管理面板 - LiteChat</title>
<link rel="stylesheet" href="/public/style.css">
</head>
<body>
<div class="admin-layout">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l-.06.06a2 2 0 0 1 2.83 2.83l.06-.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      管理面板
    </h2>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span id="connStatus" style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-tertiary);">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);"></div>
        <span>未配置</span>
      </span>
      <a href="/index.html" class="btn btn-sm">聊天界面</a>
      <button class="btn btn-sm" id="logoutBtn">登出</button>
    </div>
  </div>

  <div class="admin-section">
    <h3>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      API 提供商配置
    </h3>
    <div class="admin-row">
      <div class="form-group">
        <label class="form-label">Base URL</label>
        <input type="text" class="form-input" id="baseUrl" placeholder="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="password" class="form-input" id="apiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label class="form-label">名称 (可选)</label>
        <input type="text" class="form-input" id="providerName" placeholder="OpenAI">
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="saveProviderBtn">保存配置</button>
      <button class="btn" id="fetchModelsBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        获取模型列表
      </button>
      <span id="fetchStatus" style="font-size:12px;color:var(--text-tertiary);"></span>
    </div>
  </div>

  <div class="admin-section">
    <h3>模型管理</h3>
    <div style="overflow-x:auto;">
      <table class="admin-table" id="modelTable">
        <thead>
          <tr>
            <th>Logo</th><th>名称</th><th>模型 ID</th><th>思考链</th><th>可见性</th>
          </tr>
        </thead>
        <tbody id="modelTbody"></tbody>
      </table>
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:10px;display:flex;align-items:center;gap:4px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      点击 Logo 可上传图片。公开模型所有用户可见，私密仅管理员可用。点击切换开关可即时生效。
    </p>
  </div>

  <div id="toastContainer" class="toast-container"></div>
</div>

<script src="/public/admin.js"></script>
</body>
</html>
