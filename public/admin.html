<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>管理面板 - LiteChat</title>
<link rel="icon" type="image/svg+xml" href="/public/logo.svg">
<meta property="og:title" content="LiteChat 管理面板">
<meta property="og:description" content="轻量化、开箱即用的多用户 AI 对话网站">
<meta property="og:image" content="/public/logo.svg">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/public/style.css">
</head>
<body>
<div class="admin-layout">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="/public/logo.svg" width="36" height="36" alt="LiteChat" style="border-radius:9px;">
      <h2>管理面板</h2>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <a href="/chat" class="btn btn-sm">聊天界面</a>
      <button class="btn btn-sm" id="logoutBtn">登出</button>
    </div>
  </div>

  <div class="admin-section">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      API 提供商配置
    </h3>
    <div class="admin-row">
      <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="providerName" placeholder="OpenAI"></div>
      <div class="form-group"><label class="form-label">Base URL</label><input type="text" class="form-input" id="baseUrl" placeholder="https://api.openai.com/v1"></div>
      <div class="form-group"><label class="form-label">API Key</label><input type="password" class="form-input" id="apiKey" placeholder="sk-..."></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;">
      <button class="btn btn-primary" id="addProviderBtn">添加提供商</button>
    </div>
    <div class="provider-list" id="providerList"></div>
  </div>

  <div class="admin-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h3 style="margin-bottom:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        模型管理
      </h3>
      <button class="btn btn-sm" id="addCustomModelBtn">添加自定义模型</button>
    </div>
    <div id="customModelForm" style="display:none;margin-bottom:16px;padding:16px;border:1px solid var(--border-primary);border-radius:var(--radius-lg);background:var(--bg-primary);">
      <div class="admin-row">
        <div class="form-group"><label class="form-label">提供商</label><select class="form-input" id="customProviderId"></select></div>
        <div class="form-group"><label class="form-label">模型 ID</label><input type="text" class="form-input" id="customModelId" placeholder="gpt-4o"></div>
        <div class="form-group"><label class="form-label">显示名称</label><input type="text" class="form-input" id="customDisplayName" placeholder="GPT-4o"></div>
        <div class="form-group" style="display:flex;align-items:flex-end;gap:10px;padding-bottom:2px;">
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;"><input type="checkbox" id="customSupportReasoning"> 支持思考链</label>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" id="saveCustomModelBtn">保存</button>
      <button class="btn btn-sm" onclick="document.getElementById('customModelForm').style.display='none'">取消</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
      <button class="btn btn-sm" id="selectAllBtn">全选</button>
      <button class="btn btn-sm" id="deselectBtn">取消</button>
      <button class="btn btn-sm" id="batchPublicBtn">设为公开</button>
      <button class="btn btn-sm" id="batchPrivateBtn">设为私密</button>
      <button class="btn btn-sm" style="background:var(--success);color:#fff;border-color:var(--success);" id="allPublicBtn">一键公开全部</button>
      <button class="btn btn-sm" style="background:var(--text-muted);color:#fff;border-color:var(--text-muted);" id="allPrivateBtn">一键私密全部</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="admin-table" id="modelTable">
        <thead><tr><th style="width:32px;"><input type="checkbox" id="selectAllCheckbox" style="cursor:pointer;"></th><th>Logo</th><th>名称</th><th>模型 ID</th><th>提供商</th><th>思考链</th><th>可见性</th><th>操作</th></tr></thead>
        <tbody id="modelTbody"></tbody>
      </table>
    </div>
  </div>

  <div class="admin-section">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      用户管理
    </h3>
    <div style="overflow-x:auto;">
      <table class="admin-table" id="userTable">
        <thead><tr><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="userTbody"></tbody>
      </table>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
</div>
<script src="/public/admin.js"></script>
</body>
</html>
